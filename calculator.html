<!DOCTYPE html>
<html>
	<head>
	<title>Calculator</title><meta charset="utf-8">
	<script type="text/javascript">
		
		function square(){
			var num = document.getElementById("n1");
			num.value= num.value*num.value;
		}
		function cube() {
  			var num = document.getElementById("n1");
  			num.value = Math.pow(num.value, 3);
		}
		function elevado_a_4() {
  			var num = document.getElementById("n1");
			  num.value = Math.pow(num.value, 4);
		}
		function inverse(){
			var num = document.getElementById("n1");
			num.value= 1/num.value;
		}		
		function sin() {
  			var num = document.getElementById("n1");
  			num.value = Math.sin(num.value);
		}
	</script>
	</head>
	<body>
  		<h1>Calculadora de José Manuel Méndez Martínez</h1>
  			Number:
			  <input type="text" id="n1">
			  <p><button onclick="square()"> x^2 </button>
			  <button onclick="cube()"> x^3 </button>
			  <button onclick="elevado_a_4()"> x^4 </button>
			  <button onclick="inverse()"> 1/x </button></p>
			  <p><button onclick="sin()"> seno(x) </button></p>
	</body>
</html>
